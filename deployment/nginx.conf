server {
    listen 80;
    server_name cdbportal.cloud www.cdbportal.cloud;

    # Client upload size limit (important for uploading invoice screenshots)
    client_max_body_size 10M;

    # Frontend Static Files
    location / {
        root /var/www/smt-portal/frontend/dist;
        index index.html;
        # Essential for React Router Single Page App (SPA) fallback routing
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads directory proxy (to serve uploaded files like invoice screenshots)
    location /uploads {
        proxy_pass http://127.0.0.1:5000/uploads;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
